<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DDD · מפת מיקום</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{--navy:#0B1A2F;--panel:#11233D;--line:#1E3A5C;--ink:#E6EEF7;--muted:#7E96B2;
    --amber:#F08A24;--green:#34D399;--red:#EF4444;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--navy);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;}
  .wrap{max-width:1000px;margin:0 auto;padding:12px;}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .top h1{font-size:18px;font-weight:800;}
  .top .live{margin-inline-start:auto;font-size:12px;color:var(--muted);}
  .banner{border-radius:14px;padding:14px;text-align:center;margin-bottom:10px;border:1px solid var(--line);background:var(--panel);transition:.3s;}
  .banner h2{font-size:22px;font-weight:900;}
  .banner p{font-size:12px;opacity:.85;margin-top:2px;}
  .b-green{background:linear-gradient(180deg,rgba(52,211,153,.16),var(--panel));border-color:#1d6b4e;}
  .b-green h2{color:var(--green);}
  .b-amber{background:linear-gradient(180deg,rgba(240,138,36,.18),var(--panel));border-color:#8a5210;}
  .b-amber h2{color:var(--amber);}
  .b-red{background:linear-gradient(180deg,rgba(239,68,68,.22),var(--panel));border-color:#8a1f1f;animation:flash 1s infinite;}
  .b-red h2{color:var(--red);}
  @keyframes flash{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 22px rgba(239,68,68,.5)}}
  #map{height:46vh;border-radius:14px;border:1px solid var(--line);}
  .leaflet-popup-content{direction:rtl;}
  .hint{font-size:11px;color:var(--muted);margin:8px 0;text-align:center;}
  .stats{display:flex;gap:8px;margin:10px 0;}
  .stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center;}
  .stat b{font-size:20px;display:block;}
  .stat span{font-size:10px;color:var(--muted);}
  .roster{display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px;}
  .roster .lbl{font-size:13px;font-weight:bold;}
  .chip{padding:3px 9px;border-radius:20px;font-size:11px;border:1px solid var(--green);background:rgba(52,211,153,.2);}
  .chip.det{border-color:var(--red);background:rgba(239,68,68,.2);}
  .feedhdr{font-size:13px;font-weight:bold;color:var(--amber);margin-bottom:6px;}
  .feed{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px;max-height:200px;overflow:auto;}
  .row{display:flex;justify-content:space-between;font-size:13px;padding:7px 6px;border-bottom:1px solid var(--line);}
  .row.hot{background:rgba(239,68,68,.10);}
  .row .dev{font-size:11px;color:var(--muted);}
  .empty{color:var(--muted);font-size:12px;text-align:center;padding:14px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🦆 DDD · התראות ומפה</h1>
    <div class="live" id="clock">מתחבר…</div>
  </div>
  <div id="banner" class="banner b-green"><h2 id="b-title">— שקט —</h2><p id="b-sub">אין זיהויים פעילים</p></div>
  <div id="map"></div>
  <div class="hint">חיישנים: ירוק = מחובר · אדום = מזהה כעת. אזור מוצלל = הערכת מקור האיום.</div>
  <div class="stats">
    <div class="stat"><b id="s-online" style="color:var(--green)">0</b><span>חיישנים מחוברים</span></div>
    <div class="stat"><b id="s-now" style="color:var(--amber)">0</b><span>מזהים כעת</span></div>
    <div class="stat"><b id="s-today">0</b><span>זיהויים היום</span></div>
  </div>
  <div class="roster"><span class="lbl">🛰 חיישנים:</span><span id="roster-list"></span></div>
  <div class="feedhdr">פיד זיהויים חי</div>
  <div class="feed" id="feed"><div class="empty">ממתין לנתונים…</div></div>
</div>

<script>
// ===== CONFIG: set your real sensor positions (lat, lon). Online sensors fill slots in order. =====
const HOME=[32.7940, 34.9896];            // map center (Haifa)
const SLOTS=[
  {lat:32.7948, lon:34.9888, name:"חיישן A"},
  {lat:32.7932, lon:34.9888, name:"חיישן B"},
  {lat:32.7940, lon:34.9910, name:"חיישן C"},
  {lat:32.7940, lon:34.9870, name:"חיישן D"},
];
// =================================================================================================
const RECENT_MS=30000, COINC_MS=8000;
const map=L.map('map',{zoomControl:true}).setView(HOME,16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(map);
let markers=[], threat=null, assign={};

function slotFor(dev,i){ return SLOTS[i % SLOTS.length]; }

async function tick(){
  let reports=[],sensors=[],stats={today:0,total:0};
  try{
    reports=await (await fetch('/reports')).json();
    sensors=await (await fetch('/sensors')).json();
    stats=await (await fetch('/stats')).json();
    document.getElementById('clock').textContent='חי · '+new Date().toLocaleTimeString('he-IL');
  }catch(e){ document.getElementById('clock').textContent='שגיאת חיבור'; return; }

  const now=Date.now();
  const coincDevs=new Set(reports.filter(r=>now-r.t<COINC_MS).map(r=>r.deviceId||'?'));
  const recentDevs=new Set(reports.filter(r=>now-r.t<RECENT_MS).map(r=>r.deviceId||'?'));

  // stable slot assignment by sorted online deviceId
  const online=sensors.map(s=>s.deviceId).sort();
  online.forEach((d,i)=>{ if(!(d in assign)) assign[d]=Object.keys(assign).length; });

  markers.forEach(m=>map.removeLayer(m)); markers=[];
  if(threat){map.removeLayer(threat);threat=null;}
  const hot=[]; const allPts=[]; const realPts=[];
  online.forEach(d=>{
    const s=sensors.find(x=>x.deviceId===d);
    let lat, lon, real=false;
    if(s && typeof s.lat==='number' && typeof s.lon==='number'){ lat=s.lat; lon=s.lon; real=true; }
    else { const slot=SLOTS[assign[d]%SLOTS.length]; lat=slot.lat; lon=slot.lon; }
    allPts.push([lat,lon]);
    if(real) realPts.push([lat,lon]);
    const det=coincDevs.has(d), rec=recentDevs.has(d);
    const col=det?'#EF4444':'#34D399';
    const m=L.circleMarker([lat,lon],{radius:det?13:10,color:'#0B1A2F',weight:2,fillColor:col,fillOpacity:.95}).addTo(map);
    m.bindPopup(`<b>${real?'📍 GPS':'מיקום מוגדר'}</b><br>${d.substring(0,6)}<br>${det?'⚠ מזהה כעת':(rec?'זיהוי לאחרונה':'מחובר, שקט')}`);
    if(det){ hot.push([lat,lon]);
      markers.push(L.circleMarker([lat,lon],{radius:24,color:'#EF4444',weight:1,fillColor:'#EF4444',fillOpacity:.15}).addTo(map)); }
    markers.push(m);
  });
  // auto-frame: fit to REAL GPS positions; re-fit when the set changes (jitter-tolerant key)
  const fitPts = realPts.length ? realPts : allPts;
  if(fitPts.length){
    const key = fitPts.map(p=>p[0].toFixed(3)+','+p[1].toFixed(3)).sort().join('|');
    if(key !== window._fitKey){
      try{ map.fitBounds(fitPts,{padding:[50,50],maxZoom:16}); }catch(e){}
      window._fitKey = key;
    }
  }

  // banner + threat area
  const b=document.getElementById('banner'); b.className='banner';
  if(coincDevs.size>=2){
    b.classList.add('b-red');
    document.getElementById('b-title').textContent='⚠ התראה — מספר חיישנים';
    document.getElementById('b-sub').textContent=coincDevs.size+' חיישנים מזהים בו-זמנית — הערכת מיקום על המפה';
    const lat=hot.reduce((a,p)=>a+p[0],0)/hot.length, lon=hot.reduce((a,p)=>a+p[1],0)/hot.length;
    threat=L.circle([lat,lon],{radius:60,color:'#EF4444',weight:2,fillColor:'#EF4444',fillOpacity:.18,dashArray:'6'}).addTo(map);
    threat.bindPopup('הערכת אזור מקור האיום');
  }else if(recentDevs.size>=1){
    b.classList.add('b-amber');
    document.getElementById('b-title').textContent='זיהוי בודד';
    document.getElementById('b-sub').textContent='חיישן אחד מזהה — דרוש אימות נוסף';
  }else{
    b.classList.add('b-green');
    document.getElementById('b-title').textContent='— שקט —';
    document.getElementById('b-sub').textContent=online.length+' חיישנים מחוברים';
  }

  // stats
  document.getElementById('s-online').textContent=online.length;
  document.getElementById('s-now').textContent=coincDevs.size;
  document.getElementById('s-today').textContent=stats.today||0;

  // roster chips
  const rl=document.getElementById('roster-list');
  rl.innerHTML = online.length===0
    ? '<span style="font-size:11px;color:var(--muted)">אין גלאים מאזינים</span>'
    : online.map(d=>{
        const det=coincDevs.has(d);
        return '<span class="chip'+(det?' det':'')+'">'+d.substring(0,4)+'</span>';
      }).join('');

  // live feed
  const feed=document.getElementById('feed');
  if(reports.length===0){ feed.innerHTML='<div class="empty">אין עדיין זיהויים</div>'; }
  else{
    feed.innerHTML=reports.slice(-25).reverse().map(r=>{
      const isHot=now-r.t<COINC_MS;
      const tm=new Date(r.t).toLocaleTimeString('he-IL');
      return '<div class="row'+(isHot?' hot':'')+'"><span>'+Math.round(r.f0||0)+' Hz · '+(r.score||0)+' dB'
        +(r.dur?' · '+r.dur+'s':'')+'</span><span class="dev">'+(r.deviceId||'?').substring(0,6)+' · '+tm+'</span></div>';
    }).join('');
  }
}
tick(); setInterval(tick,2000);
</script>
</body>
</html>
