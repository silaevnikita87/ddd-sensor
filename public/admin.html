<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DDD · פאנל אדמין</title>
<style>
  :root{--navy:#0B1A2F;--panel:#11233D;--line:#1E3A5C;--ink:#E6EEF7;--muted:#7E96B2;
    --amber:#F08A24;--green:#34D399;--red:#EF4444;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--navy);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;
    max-width:520px;margin:0 auto;padding:18px;}
  h1{font-size:20px;margin-bottom:4px;}
  .sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;}
  input,select{width:100%;padding:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;color:var(--ink);font-size:16px;}
  .durs{display:flex;gap:8px;}
  .dur{flex:1;padding:12px;text-align:center;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;cursor:pointer;font-size:15px;}
  .dur.sel{border-color:var(--amber);background:rgba(240,138,36,.15);color:var(--amber);font-weight:bold;}
  button{width:100%;padding:16px;border:none;border-radius:12px;font-size:17px;font-weight:bold;
    margin-top:14px;cursor:pointer;}
  .start{background:var(--green);color:#062018;}
  .stop{background:var(--red);color:#fff;}
  .status{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .status .big{font-size:17px;font-weight:bold;margin-bottom:6px;}
  .row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--muted);}
  .row b{color:var(--ink);}
  a{color:var(--amber);}
  .hint{font-size:11px;color:var(--muted);margin-top:6px;}
</style>
</head>
<body>
  <h1>🦆 DDD · פאנל אדמין</h1>
  <div class="sub">הפעלת הקלטה מסונכרנת בכל הטלפונים</div>

  <label>שם הניסוי (לדוגמה: 10m / 20m / drone)</label>
  <input id="name" placeholder="שם לזיהוי הקבצים" value="">

  <label>משך הקלטה</label>
  <div class="durs" id="durs">
    <div class="dur" data-d="30">30 שנ׳</div>
    <div class="dur sel" data-d="60">60 שנ׳</div>
    <div class="dur" data-d="120">120 שנ׳</div>
  </div>

  <button class="start" id="startBtn">▶ התחל הקלטה בכל הטלפונים</button>
  <button class="stop" id="stopBtn">■ עצור סשן</button>

  <div class="status" id="status">
    <div class="big" id="st-title">מתחבר…</div>
    <div class="row"><span>חיישנים מחוברים (מאזינים)</span><b id="st-online">0</b></div>
    <div class="row"><span>סשן נוכחי</span><b id="st-session">—</b></div>
    <div class="hint">לפני התחלה: ודא שכל הטלפונים המקליטים לחצו "🔗 הצטרף לסשן" באפליקציה.</div>
    <div class="hint">📁 <a href="/files">צפה בהקלטות שהועלו</a></div>
  </div>

<script>
let dur=60;
document.querySelectorAll('.dur').forEach(el=>el.onclick=()=>{
  document.querySelectorAll('.dur').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel'); dur=+el.dataset.d;
});
document.getElementById('startBtn').onclick=async()=>{
  const name=document.getElementById('name').value.trim();
  try{
    const r=await fetch('/cmd/start',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({dur,name})});
    const j=await r.json();
    document.getElementById('st-title').textContent='✅ פקודה נשלחה — כולם מתחילים בעוד 5 שנ׳';
  }catch(e){ document.getElementById('st-title').textContent='שגיאת שליחה'; }
};
document.getElementById('stopBtn').onclick=async()=>{
  try{ await fetch('/cmd/stop',{method:'POST'}); }catch(e){}
};
async function poll(){
  try{
    const cmd=await (await fetch('/cmd')).json();
    const sensors=await (await fetch('/sensors')).json();
    document.getElementById('st-online').textContent=sensors.length;
    if(cmd.session){
      const s=cmd.session; const left=Math.max(0,Math.round((s.startAt-cmd.now)/1000));
      document.getElementById('st-session').textContent=s.id;
      document.getElementById('st-title').textContent = left>0
        ? '⏱ מתחיל בעוד '+left+' שנ׳ — מחא כף!'
        : '🔴 מקליט · '+s.dur+' שנ׳';
    }else{
      document.getElementById('st-session').textContent='—';
      if(!document.getElementById('st-title').textContent.includes('נשלחה'))
        document.getElementById('st-title').textContent='⚪ ממתין — מוכן להתחיל';
    }
  }catch(e){ document.getElementById('st-title').textContent='שגיאת חיבור'; }
}
poll(); setInterval(poll,1000);
</script>
</body>
</html>
